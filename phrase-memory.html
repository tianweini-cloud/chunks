<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Phrases">

<style>
:root {
  --bg:#fff;--bg2:#f5f5f5;--bg3:#efefef;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --blue-bg:#e8f0fe;--blue-text:#1a56db;
  --green-bg:#e3f5e9;--green-text:#166534;
  --amber-bg:#fef3c7;--amber-text:#92400e;
  --red-bg:#fee2e2;--red-text:#991b1b;
  --r:12px;--rs:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111;--bg2:#1e1e1e;--bg3:#2a2a2a;
  --text:#f0f0f0;--text2:#aaa;--text3:#666;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --blue-bg:#1e3a5f;--blue-text:#93c5fd;
  --green-bg:#14532d;--green-text:#86efac;
  --amber-bg:#451a03;--amber-text:#fcd34d;
  --red-bg:#450a0a;--red-text:#fca5a5;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ── Core layout: nav pinned to bottom with safe area ── */
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;line-height:1.5;overflow:hidden}
#nav{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;
  background:var(--bg);
  border-top:0.5px solid var(--border);
  /* push buttons up above home indicator */
  padding-bottom:env(safe-area-inset-bottom,0px);
  z-index:1000;
}
#content{
  position:fixed;top:0;left:0;right:0;
  /* leave room for nav (60px buttons) + safe area at bottom */
  bottom:calc(60px + env(safe-area-inset-bottom,0px));
  /* leave room for status bar at top */
  padding-top:max(env(safe-area-inset-top,0px),44px);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding-left:16px;padding-right:16px;padding-bottom:16px;
}

/* ── Nav buttons ── */
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:60px;border:none;background:none;color:var(--text3);
  font-size:11px;gap:4px;cursor:pointer;
}
.nav-btn.active{color:var(--text)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ── Surfaces ── */
.surface{background:var(--bg2);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-border{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.metric{background:var(--bg2);border-radius:var(--rs);padding:14px 12px;text-align:center}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.metric-value{font-size:24px;font-weight:600}
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin:6px 0}
.progress-fill{height:100%;background:var(--text);border-radius:3px;transition:width .4s}
.badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:500}
.badge-new{background:var(--blue-bg);color:var(--blue-text)}
.badge-review{background:var(--amber-bg);color:var(--amber-text)}
.badge-done{background:var(--green-bg);color:var(--green-text)}
.badge-scheduled{background:var(--bg3);color:var(--text2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:0.5px solid var(--border2);border-radius:var(--rs);background:none;color:var(--text);font-size:15px;cursor:pointer;transition:opacity .15s;-webkit-user-select:none}
.btn:active{opacity:.7}
.btn-primary{background:var(--text);color:var(--bg);border-color:transparent}
.btn-block{width:100%}
.btn-lg{padding:14px 24px;font-size:17px;font-weight:500;border-radius:var(--r)}
.field-label{font-size:13px;color:var(--text2);margin-bottom:5px;margin-top:14px;display:block}
input[type=text],textarea,select{width:100%;padding:11px 14px;border:0.5px solid var(--border2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-size:16px;font-family:inherit;appearance:none}
input:focus,textarea:focus{outline:none;border-color:var(--text)}
textarea{resize:vertical;min-height:90px}
.flip-card{min-height:180px;display:flex;align-items:center;justify-content:center;text-align:center;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg);padding:28px 20px;margin-bottom:14px;cursor:pointer;-webkit-user-select:none}
.flip-card:active{background:var(--bg2)}
.phrase-text{font-size:24px;font-weight:600;line-height:1.3}
.def-text{font-size:15px;color:var(--text2);margin-top:12px;line-height:1.6}
.hint-text{font-size:14px;color:var(--text3);margin-top:14px}
.rate-row{display:flex;gap:8px;margin-top:6px}
.rate-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 4px;border-radius:var(--rs);border:none;font-size:13px;font-weight:500;cursor:pointer;gap:4px;-webkit-user-select:none}
.rate-btn:active{opacity:.75}
.rate-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.r-again{background:var(--red-bg);color:var(--red-text)}
.r-hard{background:var(--amber-bg);color:var(--amber-text)}
.r-good{background:var(--green-bg);color:var(--green-text)}
.r-easy{background:var(--blue-bg);color:var(--blue-text)}
.phrase-item{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:0.5px solid var(--border)}
.phrase-item:last-child{border-bottom:none}
.phrase-item-text{flex:1;min-width:0}
.phrase-item-name{font-weight:500;font-size:15px}
.phrase-item-def{font-size:13px;color:var(--text2);margin-top:2px;line-height:1.4}
.phrase-item-cat{font-size:11px;color:var(--text3);margin-top:3px}
.cat-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-pill{padding:5px 14px;border-radius:100px;font-size:13px;background:var(--bg2);color:var(--text2);border:0.5px solid var(--border);white-space:nowrap;cursor:pointer;-webkit-user-select:none}
.cat-pill.active{background:var(--text);color:var(--bg);border-color:transparent}
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--r);padding:28px 16px;text-align:center;cursor:pointer;background:var(--bg2)}
.upload-zone:active{background:var(--bg3)}
.section-title{font-size:17px;font-weight:600;margin-bottom:14px}
.empty{text-align:center;padding:40px 16px;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:500;color:var(--text);margin-bottom:6px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.chip{display:inline-block;padding:4px 10px;border-radius:100px;font-size:12px;background:var(--bg3);color:var(--text2);margin:3px}
.ai-item{display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--border)}
.ai-item:last-child{border-bottom:none}
.del-btn{padding:6px 8px;border:0.5px solid var(--border);border-radius:var(--rs);background:none;color:var(--text3);cursor:pointer;flex-shrink:0}
.del-btn:active{background:var(--red-bg);color:var(--red-text);border-color:transparent}
</style>
</head>

</nav>

  {phrase:"Overcome a problem",meaning:"To successfully deal with and get past a difficulty",category:"Problems & Challenges"},
  {phrase:"Make an effort",meaning:"To try hard to do something",category:"Problems & Challenges"},
  {phrase:"Put pressure on someone",meaning:"To try to force someone to do something",category:"Problems & Challenges"},
  {phrase:"Avoid a mistake",meaning:"To prevent yourself from doing something wrong",category:"Problems & Challenges"},
  {phrase:"Take action",meaning:"To do something in order to deal with a situation",category:"Problems & Challenges"},
  {phrase:"Miss an opportunity",meaning:"To fail to take advantage of a chance when it arises",category:"Problems & Challenges"},
  {phrase:"Seize an opportunity",meaning:"To take advantage of a good chance quickly and decisively",category:"Problems & Challenges"},
  {phrase:"Deal with stress",meaning:"To manage feelings of worry and tension effectively",category:"Problems & Challenges"},
  {phrase:"Handle a situation",meaning:"To manage or deal with a set of circumstances",category:"Problems & Challenges"},

let S={data:null,view:'home',queue:[],card:null,shown:false,done:0,total:0,cat:'all',newPhrase:'',newMeaning:'',bulkText:'',uploading:false,aiMsg:'',aiResults:[],examples:[],exLoading:false};

function load(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return null;}
function save(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){}}
function uid(){return 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function today(){return new Date().toISOString().slice(0,10);}
function status(p){if(!p.nextReview)return'new';if(p.nextReview<=today())return'review';if(p.level>=INTERVALS.length)return'mature';return'scheduled';}
function getQueue(data){
  const t=today(),ses=data.sessions[t]||{learned:[],reviewed:[]},done=new Set([...ses.learned,...ses.reviewed]);
  const rev=data.phrases.filter(p=>status(p)==='review'&&!done.has(p.id));
  const nw=data.phrases.filter(p=>status(p)==='new'&&!done.has(p.id));
  return[...rev,...nw.slice(0,Math.max(0,DAILY-rev.length))];
}
function schedule(p,q){
  let lv=p.level||0;
  if(q==='again')lv=Math.max(0,lv-1);
  else if(q==='good')lv=Math.min(INTERVALS.length-1,lv+1);
  else if(q==='easy')lv=Math.min(INTERVALS.length-1,lv+2);
  const d=INTERVALS[lv]||INTERVALS[INTERVALS.length-1],next=new Date();
  next.setDate(next.getDate()+d);
  return{...p,level:lv,nextReview:next.toISOString().slice(0,10),lastReviewed:today(),reviewCount:(p.reviewCount||0)+1};
}
function stats(data){
  const t=today(),ses=data.sessions[t]||{learned:[],reviewed:[]};
  const c={new:0,review:0,mature:0,scheduled:0};
  data.phrases.forEach(p=>c[status(p)]++);
  return{total:data.phrases.length,due:getQueue(data).length,done:ses.learned.length+ses.reviewed.length,...c};
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  const el=document.getElementById('content');
  if(!S.data){el.innerHTML='<div class="empty"><div class="empty-icon">⏳</div><div class="empty-title">Loading…</div></div>';return;}
  ['home','study','manage','add'].forEach(v=>{
    const b=document.getElementById('nav-'+v);
    if(b)b.classList.toggle('active',S.view===v||(v==='study'&&S.view==='studying'));
  });
  const st=stats(S.data);
  const cats=['all',...new Set(S.data.phrases.map(p=>p.category).filter(Boolean))];

  if(S.view==='home'){
    const pct=st.total>0?Math.round((st.mature/st.total)*100):0;
    el.innerHTML=`
      <div style="padding-top:16px"></div>
      <div class="metrics">
        <div class="metric"><div class="metric-label">Total phrases</div><div class="metric-value">${st.total}</div></div>
        <div class="metric"><div class="metric-label">Due today</div><div class="metric-value" style="color:${st.due>0?'var(--amber-text)':'var(--green-text)'}">${st.due}</div></div>
        <div class="metric"><div class="metric-label">Done today</div><div class="metric-value">${st.done}</div></div>
        <div class="metric"><div class="metric-label">Mastered</div><div class="metric-value" style="color:var(--green-text)">${st.mature}</div></div>
      </div>
      <div class="surface">
        <div style="font-size:13px;color:var(--text2);margin-bottom:4px">Overall mastery</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="font-size:12px;color:var(--text3);text-align:right;margin-bottom:12px">${pct}%</div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:13px">
          <span><span class="dot" style="background:var(--blue-text)"></span>New: ${st.new}</span>
          <span><span class="dot" style="background:var(--amber-text)"></span>Review: ${st.review}</span>
          <span><span class="dot" style="background:var(--text3)"></span>Scheduled: ${st.scheduled}</span>
          <span><span class="dot" style="background:var(--green-text)"></span>Mastered: ${st.mature}</span>
        </div>
      </div>
      ${st.due>0?`<button class="btn btn-primary btn-block btn-lg" onclick="startStudy()">▶ Start today's session (${st.due} cards)</button>`:
        st.total===0?`<div class="empty"><div class="empty-icon">📚</div><div class="empty-title">No phrases yet</div><div class="empty-sub">Go to Add to import phrases</div></div>`:
        `<div class="empty"><div class="empty-icon">✅</div><div class="empty-title">All done for today!</div><div class="empty-sub">Come back tomorrow for the next review.</div></div>`}
      <div style="margin-top:16px;padding:14px;border-radius:var(--r);border:0.5px solid var(--border)">
        <div style="font-size:13px;font-weight:500;margin-bottom:8px">Spaced repetition intervals</div>
        <div>${INTERVALS.map((d,i)=>`<span class="chip">Lv${i+1}: +${d}d</span>`).join('')}</div>
      </div>`;
  }
  else if(S.view==='studying'){
    const prog=S.total>0?Math.round((S.done/S.total)*100):0;
    if(!S.card){
      el.innerHTML=`<div class="empty" style="padding-top:80px"><div class="empty-icon">🏆</div><div class="empty-title">Session complete!</div><div class="empty-sub">Reviewed ${S.done} phrases</div><br><button class="btn btn-primary" style="margin-top:16px" onclick="sv('home')">Back to home</button></div>`;
    }else{
      // Build examples block
      let exBlock='';
      if(S.shown){
        if(S.exLoading){
          exBlock=`<div style="margin-top:14px;padding:14px;background:var(--bg2);border-radius:var(--r)">
            <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Example sentences</div>
            <div style="font-size:13px;color:var(--text3);text-align:center;padding:6px 0">✨ Generating examples…</div>
          </div>`;
        } else if(S.examples.length>0){
          const rows=S.examples.map((s,i)=>`<div style="display:flex;gap:8px;${i<S.examples.length-1?'margin-bottom:12px':''}">
            <span style="font-size:12px;font-weight:700;color:var(--text3);flex-shrink:0;padding-top:1px">${i+1}.</span>
            <div>
              <div style="font-size:14px;line-height:1.55">${esc(s.en)}</div>
              <div style="font-size:12px;color:var(--text2);margin-top:3px;line-height:1.4">${esc(s.cn)}</div>
            </div>
          </div>`).join('');
          exBlock=`<div style="margin-top:14px;padding:14px;background:var(--bg2);border-radius:var(--r)">
            <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Example sentences</div>
            ${rows}
          </div>`;
        }
      }
      el.innerHTML=`
        <div style="padding-top:16px"></div>
        <div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:5px"><span>${S.done} done</span><span>${S.queue.length} left</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
        </div>
        ${S.card.category?`<div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:8px">${esc(S.card.category)}</div>`:''}
        <div class="flip-card" onclick="toggleShown()" style="${S.shown?'cursor:default':''}">
          <div>
            <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">${S.shown?'definition':'tap to reveal'}</div>
            <div class="phrase-text">${esc(S.card.phrase)}</div>
            ${S.shown?`<div class="def-text">${esc(S.card.meaning)}</div>`:`<div class="hint-text">👆 tap to see definition</div>`}
          </div>
        </div>
        ${exBlock}
        ${S.shown?`<div class="rate-row" style="margin-top:14px">
          <button class="rate-btn r-again" onclick="rate('again')"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>Again</button>
          <button class="rate-btn r-hard" onclick="rate('hard')"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>Hard</button>
          <button class="rate-btn r-good" onclick="rate('good')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Good</button>
          <button class="rate-btn r-easy" onclick="rate('easy')"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Easy</button>
        </div>
        <div style="font-size:12px;color:var(--text3);text-align:center;margin-top:10px">Again: retry · Hard: same · Good: +1 level · Easy: +2 levels</div>`:''}`;
    }
  }
  else if(S.view==='manage'){
    const filtered=S.data.phrases.filter(p=>S.cat==='all'||(p.category||'General')===S.cat);
    const sorted=[...filtered].sort((a,b)=>{const o={review:0,new:1,scheduled:2,mature:3};return o[status(a)]-o[status(b)];});
    const bmap={new:'badge-new',review:'badge-review',mature:'badge-done',scheduled:'badge-scheduled'};
    const lmap={new:'New',review:'Due',mature:'Mastered',scheduled:'Scheduled'};
    el.innerHTML=`
      <div style="padding-top:16px"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="section-title" style="margin-bottom:0">Phrases (${filtered.length}/${S.data.phrases.length})</div>
      </div>
      <div class="cat-scroll">${cats.map(c=>`<span class="cat-pill ${S.cat===c?'active':''}" onclick="setCat('${esc(c)}')">${c==='all'?'All':esc(c)}</span>`).join('')}</div>
      ${sorted.length===0?`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-sub">No phrases here.</div></div>`:
        `<div class="card-border">${sorted.map(p=>`
          <div class="phrase-item">
            <div class="phrase-item-text">
              <div class="phrase-item-name">${esc(p.phrase)}</div>
              <div class="phrase-item-def">${esc(p.meaning)}</div>
              ${p.category?`<div class="phrase-item-cat">${esc(p.category)}</div>`:''}
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
              <span class="badge ${bmap[status(p)]}">${lmap[status(p)]}</span>
              <button class="del-btn" onclick="del('${p.id}')">🗑</button>
            </div>
          </div>`).join('')}</div>`}`;
  }
  else if(S.view==='add'){
    el.innerHTML=`
      <div style="padding-top:16px"></div>
      <div class="section-title">Add phrases</div>
      <div class="surface" style="margin-bottom:14px">
        <div style="font-size:15px;font-weight:500;margin-bottom:12px">📄 Upload PDF or text file</div>
        <div class="upload-zone" onclick="document.getElementById('fi').click()">
          <div style="font-size:32px;margin-bottom:8px">☁️</div>
          <div style="font-size:15px;color:var(--text2)">Tap to choose a file</div>
          <div style="font-size:13px;color:var(--text3);margin-top:4px">PDF or .txt — AI extracts phrases automatically</div>
        </div>
        <input type="file" id="fi" accept=".pdf,.txt" style="display:none" onchange="handleFile(this.files[0])">
        ${S.uploading?`<div style="margin-top:12px;text-align:center;font-size:14px;color:var(--text2)">⏳ Analyzing with AI…</div>`:''}
        ${S.aiMsg?`<div style="margin-top:12px;font-size:13px;padding:10px 12px;background:var(--bg3);border-radius:var(--rs)">${S.aiMsg}</div>`:''}
        ${S.aiResults.length>0?`<div style="margin-top:14px">
          <div style="font-size:13px;font-weight:500;margin-bottom:8px">${S.aiResults.length} phrases found:</div>
          <div style="max-height:180px;overflow-y:auto;border:0.5px solid var(--border);border-radius:var(--rs);padding:8px 12px">
            ${S.aiResults.slice(0,8).map(r=>`<div class="ai-item"><span style="color:var(--green-text)">✓</span><div><div style="font-weight:500;font-size:14px">${esc(r.phrase)}</div><div style="font-size:12px;color:var(--text2);margin-top:2px">${esc(r.meaning)}</div></div></div>`).join('')}
            ${S.aiResults.length>8?`<div style="font-size:12px;color:var(--text3);padding-top:6px">…and ${S.aiResults.length-8} more</div>`:''}
          </div>
          <button class="btn btn-primary btn-block" style="margin-top:10px" onclick="importAi()">Import all ${S.aiResults.length} phrases</button>
        </div>`:''}
      </div>
      <div class="surface" style="margin-bottom:14px">
        <div style="font-size:15px;font-weight:500;margin-bottom:12px">✏️ Add single phrase</div>
        <label class="field-label" style="margin-top:0">English phrase</label>
        <input type="text" placeholder="e.g. break the ice" value="${esc(S.newPhrase)}" oninput="S.newPhrase=this.value">
        <label class="field-label">Definition (in English)</label>
        <input type="text" placeholder="e.g. to make people feel relaxed at the start" value="${esc(S.newMeaning)}" oninput="S.newMeaning=this.value">
        <button class="btn btn-primary btn-block" style="margin-top:14px" onclick="addOne()">Add phrase</button>
      </div>
      <div class="surface">
        <div style="font-size:15px;font-weight:500;margin-bottom:8px">📋 Bulk import</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:10px">One per line: <code>phrase | definition</code></div>
        <textarea placeholder="break the ice | to make people feel relaxed&#10;bite the bullet | to endure a painful situation bravely" oninput="S.bulkText=this.value">${esc(S.bulkText)}</textarea>
        <button class="btn btn-primary btn-block" style="margin-top:12px" onclick="addBulk()">Import all</button>
      </div>`;
  }
}

function sv(v){S.view=v;render();}
function setCat(c){S.cat=c;render();}
function toggleShown(){
  if(S.shown) return; // already revealed, do nothing on re-tap
  S.shown=true;
  S.examples=[];
  S.exLoading=true;
  render();
  generateExamples(S.card.phrase, S.card.meaning);
}
function startStudy(){
  const q=getQueue(S.data);
  if(!q.length){sv('home');return;}
  S.queue=[...q];S.total=q.length;S.done=0;S.card=S.queue.shift();S.shown=false;S.examples=[];S.exLoading=false;S.view='studying';render();
}
function rate(q){
  const t=today(),id=S.card.id,isNew=!S.card.nextReview;
  S.data.phrases=S.data.phrases.map(p=>p.id===id?schedule(p,q):p);
  if(!S.data.sessions[t])S.data.sessions[t]={learned:[],reviewed:[]};
  if(isNew)S.data.sessions[t].learned.push(id);else S.data.sessions[t].reviewed.push(id);
  save(S.data);S.done++;S.shown=false;S.examples=[];S.exLoading=false;S.card=S.queue.length?S.queue.shift():null;render();
}
function addOne(){
  const phrase=S.newPhrase.trim(),meaning=S.newMeaning.trim();
  if(!phrase||!meaning){alert('Please fill in both fields.');return;}
  S.data.phrases.push({id:uid(),phrase,meaning,level:0,nextReview:null,reviewCount:0});
  S.newPhrase='';S.newMeaning='';save(S.data);render();
}
function addBulk(){
  const lines=S.bulkText.split('\n').filter(l=>l.trim());let added=0;
  lines.forEach(line=>{
    const parts=line.split('|');
    if(parts.length>=2){const phrase=parts[0].trim(),meaning=parts.slice(1).join('|').trim();
    if(phrase&&meaning){S.data.phrases.push({id:uid(),phrase,meaning,level:0,nextReview:null,reviewCount:0});added++;}}
  });
  if(!added){alert('No valid phrases found.\nFormat: phrase | definition');return;}
  S.bulkText='';save(S.data);alert(`Added ${added} phrases!`);sv('home');
}
function del(id){
  if(!confirm('Delete this phrase?'))return;
  S.data.phrases=S.data.phrases.filter(p=>p.id!==id);save(S.data);render();
}
async function handleFile(file){
  if(!file)return;
  S.uploading=true;S.aiMsg='';S.aiResults=[];render();
  try{
    let body;
    if(file.name.endsWith('.pdf')||file.type==='application/pdf'){
      const buf=await file.arrayBuffer(),bytes=new Uint8Array(buf);
      let bin='';for(let i=0;i<bytes.byteLength;i++)bin+=String.fromCharCode(bytes[i]);
      const b64=btoa(bin);
      body={model:'claude-sonnet-4-6',max_tokens:4000,messages:[{role:'user',content:[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
        {type:'text',text:'Extract all English phrases, collocations, or vocabulary items from this document. For each, write a concise English definition. Return ONLY a JSON array, no markdown: [{"phrase":"...","meaning":"short English definition","category":"..."}]'}
      ]}]};
    }else{
      const text=await file.text();
      body={model:'claude-sonnet-4-6',max_tokens:4000,messages:[{role:'user',content:`Extract all English phrases from this text with short English definitions. Return ONLY JSON array, no markdown:\n[{"phrase":"...","meaning":"...","category":"..."}]\n\n${text.slice(0,8000)}`}]};
    }
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();
    const content=data.content.map(i=>i.text||'').join('');
    S.aiResults=JSON.parse(content.replace(/```json|```/g,'').trim());
    S.aiMsg=`✓ Found ${S.aiResults.length} phrases.`;
  }catch(e){S.aiMsg=`Error: ${e.message}`;}
  S.uploading=false;render();
}
async function importAi(){
  let added=0;
  S.aiResults.forEach(r=>{if(r.phrase&&r.meaning){S.data.phrases.push({id:uid(),phrase:r.phrase,meaning:r.meaning,category:r.category||'General',level:0,nextReview:null,reviewCount:0});added++;}});
  S.aiResults=[];S.aiMsg='';save(S.data);alert(`Imported ${added} phrases!`);sv('home');
}
async function generateExamples(phrase, meaning){
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:600,
        messages:[{role:'user',content:`Generate exactly 3 natural, everyday example sentences using the English phrase "${phrase}" (meaning: ${meaning}).
Rules:
- Sentences must sound like real spoken English, not textbook examples
- Cover different contexts (e.g. work, daily life, relationships)
- Each sentence should clearly show the meaning of the phrase in context
- Keep sentences concise (under 20 words each)
Return ONLY a JSON array, no markdown:
[{"en":"...","cn":"..."},{"en":"...","cn":"..."},{"en":"...","cn":"..."}]`}]
      })
    });
    const data=await res.json();
    const text=data.content.map(i=>i.text||'').join('');
    const parsed=JSON.parse(text.replace(/\`\`\`json|\`\`\`/g,'').trim());
    S.examples=parsed;
  }catch(e){
    S.examples=[{en:'Could not load examples. Check your connection.',cn:'无法加载例句，请检查网络连接。'}];
  }
  S.exLoading=false;
  if(S.view==='studying' && S.shown) render();
}

(function init(){
  let d=load();
  if(!d){d={phrases:BUILT_IN.map(p=>({...p,id:uid(),level:0,nextReview:null,reviewCount:0})),sessions:{}};save(d);}
  S.data=d;render();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
})();
</script>
</body>
</html>
